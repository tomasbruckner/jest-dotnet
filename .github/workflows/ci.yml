name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore JestDotnet/

      - name: Build
        run: dotnet build JestDotnet/ --no-restore

      - name: Test
        run: dotnet test JestDotnet/ --no-build
        env:
          CI: true
