name: Publish to NuGet

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore JestDotnet/

      - name: Build
        run: dotnet build JestDotnet/ --no-restore --configuration Release

      - name: Test
        run: dotnet test JestDotnet/ --no-build --configuration Release
        env:
          CI: true

      - name: Pack
        run: dotnet pack JestDotnet/JestDotnet/JestDotnet.csproj --no-build --configuration Release --output nupkgs

      - name: Publish to NuGet
        run: dotnet nuget push nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: nupkgs/*.nupkg
